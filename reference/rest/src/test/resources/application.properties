quarkus.arc.selected-alternatives=org.a2aproject.sdk.server.apps.common.TestHttpClient

# Security configuration for regular tests
# Inject a test user automatically so @Authenticated checks pass without requiring credentials
# AuthTestProfile overrides this to require REAL HTTP Basic Auth
quarkus.test.security.auth.enabled=true
quarkus.test.security.default-user=testuser
quarkus.test.security.default-roles=user