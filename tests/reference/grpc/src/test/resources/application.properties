# gRPC server configuration - use main HTTP port (not separate port)
quarkus.grpc.server.use-separate-server=false
quarkus.http.port=8081

# Index the v0.3 server-conversion test-jar for CDI bean discovery
quarkus.index-dependency.server-conversion.group-id=org.a2aproject.sdk
quarkus.index-dependency.server-conversion.artifact-id=a2a-java-sdk-compat-0.3-server-conversion
quarkus.index-dependency.server-conversion.classifier=tests

quarkus.arc.selected-alternatives=org.a2aproject.sdk.server.apps.common.TestHttpClient,org.a2aproject.sdk.compat03.conversion.TestHttpClient_v0_3

# Exclude v0.3 AgentExecutorProducer to avoid CDI ambiguity with the v1.0 one
quarkus.arc.exclude-types=org.a2aproject.sdk.compat03.conversion.AgentExecutorProducer_v0_3

quarkus.log.category."org.a2aproject.sdk.server.events".level=DEBUG
quarkus.log.category."org.a2aproject.sdk.server.requesthandlers".level=DEBUG
quarkus.log.category."org.a2aproject.sdk.server.tasks".level=DEBUG

%test.quarkus.test-security.test-enabled=true
%test.quarkus.test-security.user=testuser
%test.quarkus.test-security.roles=user
