name: ITK

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  itk:
    name: ITK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run ITK Tests
        run: bash run_itk.sh
        working-directory: itk
        env:
          A2A_ITK_REVISION: main
