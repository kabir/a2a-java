name: Build and Test

on:
  # Handle all branches for now
  push:
  pull_request:
  workflow_dispatch:

# Only run the latest job
concurrency:
  group: '${{ github.workflow }} @ ${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        java-version: ['17', '21', '25']
        include:
          - os: windows-latest
            java-version: '17'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven and run tests
      run: mvn -B install --file pom.xml -fae ${{ matrix.os == 'windows-latest' && '-DskipDockerTests=true' || '' }}
    - name: Upload Test Reports
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: surefire-reports-${{ matrix.os }}-java-${{ matrix.java-version }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
        retention-days: 7
        if-no-files-found: warn
    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: build-logs-${{ matrix.os }}-java-${{ matrix.java-version }}
        path: |
          **/target/*.log
          **/target/quarkus.log
        retention-days: 3
        if-no-files-found: ignore
